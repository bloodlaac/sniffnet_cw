spring.datasource.url=jdbc:h2:mem:sniffnet;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

app.jwt.secret=0123456789012345678901234567890123456789012345678901234567890123
app.jwt.expiration=PT12H
app.jwt.refresh-expiration=P7D
app.storage.image-directory=target/test-storage/images
app.storage.max-image-size-bytes=5242880
app.integration.training-service-url=http://localhost:8081
app.integration.classification-service-url=http://localhost:8082
