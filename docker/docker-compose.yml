services:
  postgres:
    image: postgres:16
    container_name: sniffnet_cw_postgres
    environment:
      POSTGRES_DB: sniff_cw_db
      POSTGRES_USER: bloodlaac
      POSTGRES_PASSWORD: 1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  postgres_data:
